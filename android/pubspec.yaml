name: android_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: ^3.11.0

dependencies:
  connectivity_plus: ^7.1.1
  flutter:
    sdk: flutter
  http: ^1.6.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3
  sqflite: ^2.4.2+1
  uuid: ^4.5.3
  fl_chart: ^0.70.2
  get_it: ^8.0.3
  file_picker: ^8.3.3
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/bg_pattern.png
    - assets/images/onboarding_welcome.png
    - assets/images/onboarding1.png
    - assets/images/icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
